# Keeps the site in sync with PyTorch releases:
#   - daily cron scrapes the official wheel index and commits data changes
#   - every push to main (and every data change) rebuilds and redeploys Pages
name: Update data and deploy

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * *" # daily; catches new PyTorch/CUDA/ROCm/XPU wheels within a day
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Update compatibility data from PyTorch wheel index
        run: python scripts/update_data.py

      - name: Commit refreshed data
        if: github.event_name != 'pull_request'
        run: |
          if ! git diff --quiet data/torch_matrix.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/torch_matrix.json
            git commit -m "chore: update PyTorch compatibility data"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "Compatibility data unchanged"
          fi

      - name: Build site
        run: python scripts/build_site.py

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
